<!DOCTYPE html>
<html>
<head>
    <title>Yegna Bingo</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 50px;
        }
        h1 { font-size: 3em; }
        .status {
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 20px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        input {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }
    </style>
</head>
<body>
    <h1>🎮 Yegna Bingo</h1>
    <p>Ethiopia's #1 Multiplayer Bingo Game!</p>
    
    <div class="status" id="status">Connecting...</div>
    
    <input type="text" id="playerName" placeholder="Enter your name">
    <button onclick="createGame()">Create Game</button>
    <button onclick="joinGame()">Join Game</button>
    
    <div id="gamePanel" style="display:none; margin-top:20px;">
        <h3>Game ID: <span id="gameId"></span></h3>
        <button onclick="startGame()">Start Game</button>
        <button onclick="callNumber()">Call Number</button>
        <button onclick="bingo()" style="background:#f44336;">BINGO!</button>
        <p>Current Number: <strong id="currentNumber">-</strong></p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({ transports: ["websocket", "polling"] });
        let currentGameId = null;
        
        socket.on("connect", () => {
            document.getElementById("status").innerHTML = "✅ Connected to Server!";
            document.getElementById("status").style.background = "rgba(76, 175, 80, 0.3)";
        });
        
        socket.on("gameCreated", (data) => {
            currentGameId = data.gameId;
            document.getElementById("gamePanel").style.display = "block";
            document.getElementById("gameId").innerHTML = currentGameId;
        });
        
        socket.on("gameJoined", (data) => {
            currentGameId = data.gameId;
            document.getElementById("gamePanel").style.display = "block";
            document.getElementById("gameId").innerHTML = currentGameId;
        });
        
        socket.on("gameStarted", () => {
            alert("Game has started!");
        });
        
        socket.on("numberCalled", (data) => {
            document.getElementById("currentNumber").innerHTML = data.number;
            alert("Number called: " + data.number);
        });
        
        socket.on("gameEnded", (data) => {
            alert("Game Over! Winner: " + data.winner);
            document.getElementById("gamePanel").style.display = "none";
        });
        
        function createGame() {
            const name = document.getElementById("playerName").value || "Player";
            socket.emit("createGame", { playerName: name });
        }
        
        function joinGame() {
            const name = document.getElementById("playerName").value || "Player";
            socket.emit("joinGame", { playerName: name });
        }
        
        function startGame() {
            socket.emit("startGame", currentGameId);
        }
        
        function callNumber() {
            socket.emit("callNumber", currentGameId);
        }
        
        function bingo() {
            const name = document.getElementById("playerName").value || "Player";
            socket.emit("bingo", { gameId: currentGameId, playerName: name });
        }
    </script>
</body>
</html>
